<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Assistent</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin:10px 0;
padding:12px;
border-radius:10px;
max-width:70%;
}

.user{
background:#22c55e;
margin-left:auto;
color:black;
}

.ai{
background:#1e293b;
}

#inputArea{
display:flex;
padding:10px;
background:#020617;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

button{
margin-left:5px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

#imageResult{
max-width:300px;
margin-top:10px;
border-radius:10px;
}

footer{
text-align:center;
font-size:12px;
padding:10px;
color:#9ca3af;
}

</style>
</head>

<body>

<header>AI Assistent</header>

<div id="chat"></div>

<div id="inputArea">

<input id="input" placeholder="Ask something...">

<button onclick="send()">Send</button>

<button onclick="voice()">🎤</button>

<button onclick="generateImage()">🎨</button>

</div>

<footer>
© This AI was created by Liamz
</footer>

<script>

let chatBox=document.getElementById("chat")

let history=JSON.parse(localStorage.getItem("ai_chat")||"[]")

history.forEach(m=>{
displayMsg(m.text,m.type)
})

function displayMsg(text,type){

let div=document.createElement("div")
div.className="msg "+type
div.innerHTML=text

chatBox.appendChild(div)
chatBox.scrollTop=chatBox.scrollHeight

}

function saveMsg(text,type){

history.push({text,type})
localStorage.setItem("ai_chat",JSON.stringify(history))

}

async function send(){

let input=document.getElementById("input")
let text=input.value.trim()

if(!text) return

displayMsg(text,"user")
saveMsg(text,"user")

input.value=""

displayMsg("Thinking...","ai")

try{

let messages=history.map(m=>{
return {
role: m.type==="user" ? "user":"assistant",
content: m.text
}
})

messages.push({role:"user",content:text})

let response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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"
},

body:JSON.stringify({
model:"gpt-4.1-mini",
messages:messages
})

})

let data=await response.json()

chatBox.lastChild.remove()

let reply=data.choices?.[0]?.message?.content || "AI tidak memberi jawaban."

displayMsg(reply,"ai")
saveMsg(reply,"ai")

}catch(err){

chatBox.lastChild.remove()
displayMsg("Error connecting to AI.","ai")

}

}

function voice(){

let rec=new webkitSpeechRecognition()

rec.lang="en-US"

rec.onresult=function(e){

document.getElementById("input").value=e.results[0][0].transcript

}

rec.start()

}

function generateImage(){

let prompt=window.prompt("Describe image")

if(!prompt) return

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)

let img=document.createElement("img")
img.src=url
img.id="imageResult"

displayMsg("Generating image: "+prompt,"ai")

chatBox.appendChild(img)

}

</script>


</script>

</body>
</html>
